<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Recipes — Chacha Masala™</title>
  <meta name="description" content="Authentic Pakistani recipes using Chacha Masala. From fruit chaat to biryani — discover how to use our masalas.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0e0b07;
      --bg2: #15110a;
      --saffron: #C8873A;
      --saffron-light: #e8a555;
      --text: #f5f0e8;
      --text-muted: #a89880;
      --border: rgba(200,135,58,0.2);
      --card-bg: #1a140d;
    }
    html { scroll-behavior: smooth; }
    body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; min-height: 100vh; }

    /* NAV */
    nav { position: sticky; top: 0; z-index: 100; background: rgba(14,11,7,0.95); backdrop-filter: blur(12px); border-bottom: 1px solid var(--border); padding: 0 5vw; display: flex; align-items: center; justify-content: space-between; height: 64px; }
    .nav-brand { font-family: 'Playfair Display', serif; font-size: 1.2rem; color: var(--saffron); text-decoration: none; letter-spacing: .5px; }
    .nav-links { display: flex; align-items: center; gap: 28px; }
    .nav-link { color: var(--text-muted); text-decoration: none; font-size: 13px; letter-spacing: .5px; transition: color .2s; }
    .nav-link:hover, .nav-link.active { color: var(--text); }
    .btn-nav { background: var(--saffron); color: #fff; border: none; padding: .5rem 1.2rem; border-radius: 6px; font-size: 13px; font-weight: 600; cursor: pointer; text-decoration: none; transition: background .2s; }
    .btn-nav:hover { background: var(--saffron-light); }

    /* HERO */
    .recipes-hero { padding: 80px 5vw 48px; text-align: center; }
    .section-label { font-size: 11px; letter-spacing: 2px; text-transform: uppercase; color: var(--saffron); margin-bottom: 12px; }
    .recipes-hero h1 { font-family: 'Playfair Display', serif; font-size: clamp(2rem, 5vw, 3.5rem); font-weight: 700; line-height: 1.15; margin-bottom: 16px; }
    .recipes-hero p { color: var(--text-muted); font-size: 1rem; max-width: 520px; margin: 0 auto 32px; line-height: 1.7; }

    /* FILTER */
    .filter-bar { display: flex; justify-content: center; gap: 10px; flex-wrap: wrap; margin-bottom: 48px; }
    .filter-btn { background: transparent; border: 1px solid var(--border); color: var(--text-muted); padding: .45rem 1.2rem; border-radius: 20px; font-size: 13px; cursor: pointer; transition: all .2s; font-family: 'Inter', sans-serif; }
    .filter-btn:hover, .filter-btn.active { background: var(--saffron); border-color: var(--saffron); color: #fff; }

    /* GRID */
    .recipes-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 24px; padding: 0 5vw 80px; max-width: 1200px; margin: 0 auto; }

    /* CARD */
    .recipe-card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; text-decoration: none; color: inherit; display: flex; flex-direction: column; transition: transform .2s, border-color .2s; }
    .recipe-card:hover { transform: translateY(-4px); border-color: var(--saffron); }
    .recipe-card-img { width: 100%; height: 200px; object-fit: cover; background: var(--bg2); display: flex; align-items: center; justify-content: center; font-size: 3rem; }
    .recipe-card-img img { width: 100%; height: 200px; object-fit: cover; }
    .recipe-card-body { padding: 16px 20px 20px; flex: 1; display: flex; flex-direction: column; }
    .recipe-masala-badge { display: inline-block; font-size: 10px; font-weight: 700; letter-spacing: .5px; text-transform: uppercase; padding: 3px 9px; border-radius: 10px; margin-bottom: 10px; }
    .badge-SPCM { background: #fffbeb; color: #d97706; }
    .badge-SPGM { background: #f5f3ff; color: #7c3aed; }
    .badge-SPFM { background: #e0f2fe; color: #0369a1; }
    .recipe-card-title { font-family: 'Playfair Display', serif; font-size: 1.15rem; font-weight: 700; margin-bottom: 8px; line-height: 1.3; }
    .recipe-card-desc { color: var(--text-muted); font-size: 13px; line-height: 1.6; flex: 1; margin-bottom: 14px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    .recipe-meta { display: flex; gap: 14px; font-size: 12px; color: var(--text-muted); }
    .recipe-meta span::before { margin-right: 4px; }

    /* EMPTY */
    .empty-state { text-align: center; padding: 80px 20px; color: var(--text-muted); grid-column: 1/-1; }
    .empty-state p { font-size: 1rem; margin-top: 12px; }

    /* FOOTER */
    footer { border-top: 1px solid var(--border); padding: 32px 5vw; text-align: center; color: var(--text-muted); font-size: 12px; }
    footer a { color: var(--saffron); text-decoration: none; }

    @media (max-width: 600px) {
      .nav-links .nav-link { display: none; }
      .recipes-grid { grid-template-columns: 1fr; padding: 0 4vw 60px; }
    }
  </style>
</head>
<body>

<nav>
  <a href="/chacha.html" class="nav-brand">Chacha Masala™</a>
  <div class="nav-links">
    <a href="/chacha.html#products" class="nav-link">Products</a>
    <a href="/recipes.html" class="nav-link active">Recipes</a>
    <a href="/chacha.html#story" class="nav-link">Our Story</a>
    <button class="btn-nav" onclick="window.location='/chacha.html';setTimeout(function(){if(window.openOrderModal)openOrderModal();},400)">Order Now</button>
  </div>
</nav>

<div class="recipes-hero">
  <p class="section-label">In the Kitchen</p>
  <h1>Recipes &amp; Ideas</h1>
  <p>Discover how Chacha Masala brings every dish to life — from five-minute snacks to weekend feasts.</p>
  <div class="filter-bar" id="filter-bar">
    <button class="filter-btn active" onclick="filterRecipes('all', this)">All Recipes</button>
    <button class="filter-btn" onclick="filterRecipes('SPCM', this)">Chaat Masala</button>
    <button class="filter-btn" onclick="filterRecipes('SPGM', this)">Garam Masala</button>
  </div>
</div>

<div class="recipes-grid" id="recipes-grid">
  <div class="empty-state"><p>Loading recipes…</p></div>
</div>

<footer>
  <p>© 2026 Chacha Masala™ · <a href="/chacha.html">Home</a> · <a href="https://wa.me/923359997283">WhatsApp</a> · hello@chachamasala.com</p>
</footer>

<script>
var _allRecipes = [];
var _activeFilter = 'all';

function filterRecipes(code, btn) {
  _activeFilter = code;
  document.querySelectorAll('.filter-btn').forEach(function(b) { b.classList.remove('active'); });
  if (btn) btn.classList.add('active');
  renderGrid();
}

function renderGrid() {
  var grid = document.getElementById('recipes-grid');
  var filtered = _activeFilter === 'all' ? _allRecipes : _allRecipes.filter(function(r) { return r.masala_code === _activeFilter; });
  if (!filtered.length) {
    grid.innerHTML = '<div class="empty-state"><div style="font-size:3rem">🍽</div><p>No recipes here yet — check back soon!</p></div>';
    return;
  }
  grid.innerHTML = filtered.map(function(r) {
    var total = (r.prep_mins || 0) + (r.cook_mins || 0);
    var timeStr = total ? total + ' min' : '';
    var servesStr = r.serves ? 'Serves ' + r.serves : '';
    var meta = [timeStr, servesStr].filter(Boolean).join(' · ');
    var imgHtml = r.image_url
      ? '<img src="' + r.image_url + '" alt="' + r.title + '" style="width:100%;height:200px;object-fit:cover">'
      : '<div class="recipe-card-img">🍽</div>';
    var descText = (r.description || '').substring(0, 120);
    return '<a href="/recipe.html?slug=' + r.slug + '" class="recipe-card">' +
      '<div style="overflow:hidden;height:200px">' + imgHtml + '</div>' +
      '<div class="recipe-card-body">' +
        '<span class="recipe-masala-badge badge-' + r.masala_code + '">' + masalaLabel(r.masala_code) + '</span>' +
        '<div class="recipe-card-title">' + r.title + '</div>' +
        (descText ? '<div class="recipe-card-desc">' + descText + '</div>' : '') +
        (meta ? '<div class="recipe-meta"><span>' + meta + '</span></div>' : '') +
      '</div>' +
    '</a>';
  }).join('');
}

function masalaLabel(code) {
  return { SPCM: 'Chaat Masala', SPGM: 'Garam Masala', SPFM: 'Fish Masala' }[code] || code;
}

fetch('/api/public/recipes')
  .then(function(r) { return r.json(); })
  .then(function(data) {
    _allRecipes = data || [];
    renderGrid();
  })
  .catch(function() {
    document.getElementById('recipes-grid').innerHTML = '<div class="empty-state"><p>Could not load recipes. Please try again later.</p></div>';
  });
</script>
</body>
</html>
