    <tspan x="144" y="68">CETOPIA</tspan>
  </text>

  <!-- Separator -->
  <line x1="36" y1="80" x2="424" y2="80" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>

  <!-- Tagline -->
  <text x="230" y="101" text-anchor="middle"
        font-family="'IBM Plex Sans','Helvetica Neue',Arial,sans-serif"
        font-size="11.5" fill="rgba(255,255,255,0.45)" letter-spacing="6" font-weight="400">FLAVORS REDEFINED</text>
