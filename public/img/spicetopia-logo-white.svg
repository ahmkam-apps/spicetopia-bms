<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 460 115">
  <defs>
    <linearGradient id="chiliGradW" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%"   stop-color="#FFB347"/>
      <stop offset="55%"  stop-color="#FA6420"/>
      <stop offset="100%" stop-color="#D42010"/>
    </linearGradient>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@700&amp;display=swap');
    </style>
  </defs>

  <!-- SP -->
  <text font-family="'IBM Plex Sans','Helvetica Neue',Arial,sans-serif"
        font-weight="700" font-size="54" fill="#FFFFFF" letter-spacing="1">
    <tspan x="36" y="68">SP</tspan>
  </text>

  <!-- Chili flame -->
  <path d="M128,16 C138,26 140,46 135,58 Q128,67 121,58 C116,46 118,26 128,16 Z"
