<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 460 115">
  <defs>
    <linearGradient id="chiliGrad" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%"   stop-color="#FA7B1A"/>
      <stop offset="55%"  stop-color="#D43510"/>
      <stop offset="100%" stop-color="#A81408"/>
    </linearGradient>
  </defs>

  <!-- SP -->
  <text font-family="'Arial Black','Arial Bold',Arial,sans-serif"
        font-weight="900" font-size="54" fill="#1E1B18" letter-spacing="1">
    <tspan x="36" y="68">SP</tspan>
  </text>

  <!-- Chili flame — replaces the I in SPICE -->
  <!-- Center x≈128, spans y 16→67 -->
  <path d="M128,16 C138,26 140,46 135,58 Q128,67 121,58 C116,46 118,26 128,16 Z"
        fill="url(#chiliGrad)"/>

  <!-- CETOPIA -->
  <text font-family="'Arial Black','Arial Bold',Arial,sans-serif"
        font-weight="900" font-size="54" fill="#1E1B18" letter-spacing="1">
    <tspan x="144" y="68">CETOPIA</tspan>
  </text>

  <!-- Separator line — light salmon matching the logo -->
  <line x1="36" y1="80" x2="424" y2="80" stroke="#D4A090" stroke-width="0.9"/>

  <!-- Tagline -->
  <text x="230" y="101" text-anchor="middle"
        font-family="Arial,Helvetica,sans-serif"
        font-size="11.5" fill="#909090" letter-spacing="6" font-weight="400">FLAVORS REDEFINED</text>
</svg>
