<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 460 115">
  <defs>
    <linearGradient id="chiliGrad" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%"   stop-color="#FA7B1A"/>
      <stop offset="55%"  stop-color="#D43510"/>
      <stop offset="100%" stop-color="#A81408"/>
    </linearGradient>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@700&amp;display=swap');
    </style>
  </defs>

  <!-- SP -->
  <text font-family="'IBM Plex Sans','Helvetica Neue',Arial,sans-serif"
        font-weight="700" font-size="54" fill="#161616" letter-spacing="1">
    <tspan x="36" y="68">SP</tspan>
  </text>

  <!-- Chili flame — replaces the I in SPICETOPIA -->
  <path d="M128,16 C138,26 140,46 135,58 Q128,67 121,58 C116,46 118,26 128,16 Z"
        fill="url(#chiliGrad)"/>

  <!-- CETOPIA -->
  <text font-family="'IBM Plex Sans','Helvetica Neue',Arial,sans-serif"
        font-weight="700" font-size="54" fill="#161616" letter-spacing="1">
    <tspan x="144" y="68">CETOPIA</tspan>
  </text>

  <!-- Separator line — Carbon border gray -->
  <line x1="36" y1="80" x2="424" y2="80" stroke="#e0e0e0" stroke-width="1"/>

  <!-- Tagline -->
  <text x="230" y="101" text-anchor="middle"
        font-family="'IBM Plex Sans','Helvetica Neue',Arial,sans-serif"
        font-size="11.5" fill="#a8a8a8" letter-spacing="6" font-weight="400">FLAVORS REDEFINED</text>
</svg>
